name: "Labels: Branch staging"

on:
  pull_request_target:
    types:
      - opened
    branches:
      - 'staging'

# Wayfarer
permissions:
  pull-requests: write
# End Wayfarer

jobs:
  add_label:
    runs-on: ubuntu-latest
    steps:
    - uses: actions-ecosystem/action-add-labels@v1
      with:
        labels: "Branch: Staging"
