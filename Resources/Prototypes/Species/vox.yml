- type: species
  id: Vox
  name: species-name-vox
  roundStart: true
  prototype: MobVox
  sprites: MobVoxSprites
  markingLimits: MobVoxMarkingLimits
  dollPrototype: MobVoxDummy
  skinColoration: Hues # imp VoxFeathers<Hues
  defaultSkinTone: "#6c741d"
  maleFirstNames: NamesVox
  femaleFirstNames: NamesVox
  naming: First
  sexes:
  - Unsexed

- type: speciesBaseSprites
  id: MobVoxSprites
  sprites:
    Special: MobHumanoidAnyMarking # Wayfarer
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Head: MobVoxHead
    HeadTop: MobHumanoidAnyMarking # Wayfarer
    HeadSide: MobHumanoidAnyMarking # Wayfarer
    Snout: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking # Wayfarer
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking # Wayfarer
    Chest: MobVoxTorso
    Eyes: MobVoxEyes
    LArm: MobVoxLArm
    RArm: MobVoxRArm
    LHand: MobVoxLHand
    RHand: MobVoxRHand
    LLeg: MobVoxLLeg
    RLeg: MobVoxRLeg
    LFoot: MobVoxLFoot
    RFoot: MobVoxRFoot
    Tail: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking # Wayfarer
    TailOversuit: MobHumanoidAnyMarking # Wayfarer
    RArmExtension: MobHumanoidAnyMarking # Wayfarer: Adds Wing Slot

- type: markingPoints
  id: MobVoxMarkingLimits
  onlyWhitelisted: false # WayfarerL true<false
  points:
    Special:
      points: 32 # Wayfarer
      required: false
    Hair:
      points: 32 # Wayfarer: 1<32
      required: false
    FacialHair:
      points: 32 # Wayfarer: 1<32
      required: false
    Head:
      points: 32 # Wayfarer: 1<32
      required: true
    HeadTop:
      points: 32 # Wayfarer
      required: false
    HeadSide:
      points: 32 # Wayfarer
      required: false
    Snout:
      points: 32 # Wayfarer: 1<32
      required: true
      defaultMarkings: [ VoxBeak ]
    NeckFluff:
      points: 32 # Wayfarer
      required: false
    Chest:
      points: 32 # Wayfarer: 2<32
      required: false
    Arms:
      points: 32 # Wayfarer: 4<32
      required: true
      defaultMarkings: [ VoxLArmScales, VoxRArmScales, VoxRHandScales, VoxLHandScales ]
    Legs:
      points: 32 # Wayfarer: 4<32
      required: true
      defaultMarkings: [ VoxLLegScales, VoxRLegScales, VoxRFootScales, VoxLFootScales ]
    Tail:
      points: 32 # Wayfarer: 1<32
      required: true
      defaultMarkings: [ VoxTail ]
    UndergarmentTop:
      points: 32 # Wayfarer: 1<32
      required: false
    UndergarmentBottom:
      points: 32 # Wayfarer: 1<32
      required: false
    Genital:
      points: 32 # Wayfarer
      required: false
    Overlay: # imp
      points: 32 # Wayfarer: 4<32
      required: false

