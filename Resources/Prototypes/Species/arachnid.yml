- type: species
  id: Arachnid
  name: species-name-arachnid
  roundStart: true
  prototype: MobArachnid
  sprites: MobArachnidSprites
  defaultSkinTone: "#385878"
  markingLimits: MobArachnidMarkingLimits
  dollPrototype: MobArachnidDummy
  skinColoration: Hues
  maleFirstNames: NamesArachnidFirst
  femaleFirstNames: NamesArachnidFirst
  lastNames: NamesArachnidLast
  sexes:
  - Unsexed

- type: speciesBaseSprites
  id: MobArachnidSprites
  sprites:
    Special: MobHumanoidAnyMarking # Wayfarer
    Hair: MobHumanoidAnyMarking # Wayfarer
    FacialHair: MobHumanoidAnyMarking # Wayfarer
    Head: MobArachnidHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking # Wayfarer
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking # Wayfarer
    Chest: MobArachnidTorso
    Eyes: MobArachnidEyes
    LArm: MobArachnidLArm
    RArm: MobArachnidRArm
    LHand: MobArachnidLHand
    RHand: MobArachnidRHand
    LLeg: MobArachnidLLeg
    RLeg: MobArachnidRLeg
    LFoot: MobArachnidLFoot
    RFoot: MobArachnidRFoot
    Tail: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking # Wayfarer
    TailOversuit: MobHumanoidAnyMarking # Wayfarer
    RArmExtension: MobHumanoidAnyMarking # Wayfarer Adds Wing Slot

- type: humanoidBaseSprite
  id: MobArachnidEyes
  baseSprite:
    sprite: Mobs/Species/Arachnid/parts.rsi
    state: eyes

- type: markingPoints
  id: MobArachnidMarkingLimits
  onlyWhitelisted: false # Wayfarer: true<false
  points:
    Special:
      points: 32 # Wayfarer
      required: false
    Hair:
      points: 32 # Wayfarer 0<32
      required: false
    FacialHair:
      points: 32 # Wayfarer 0<32
      required: false
    Head:
      points: 32 # Wayfarer
      required: false
    HeadTop:
      points: 32 # Wayfarer 1<32
      required: false
    HeadSide:
      points: 32 # Wayfarer 1<32
      required: true
      defaultMarkings: [ ArachnidCheliceraeDownwards ]
    Snout:
      points: 32 # Wayfarer
      required: false
    NeckFluff:
      points: 32 # Wayfarer
      required: false
    Chest:
      points: 32 # Wayfarer 2<32
      required: false
    Legs:
      points: 32 # Wayfarer 2<32
      required: false
    Arms:
      points: 32 # Wayfarer 2<32
      required: false
    Tail:
      points: 32 # Wayfarer 1<32
      required: true
      defaultMarkings: [ ArachnidAppendagesDefault ]
    UndergarmentTop:
      points: 32 # Wayfarer
      required: false
    UndergarmentBottom:
      points: 32 # Wayfarer
      required: false
    Genital:
      points: 32 # Wayfarer
      required: false
    Overlay:
      points: 32 # Wayfarer
      required: false

