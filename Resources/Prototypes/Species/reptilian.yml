- type: species
  id: Reptilian
  name: species-name-reptilian
  roundStart: true
  prototype: MobReptilian
  sprites: MobReptilianSprites
  defaultSkinTone: "#34a223"
  markingLimits: MobReptilianMarkingLimits
  dollPrototype: MobReptilianDummy
  skinColoration: Hues
  maleFirstNames: NamesReptilianMale
  femaleFirstNames: NamesReptilianFemale
  naming: FirstDashFirst

- type: speciesBaseSprites
  id: MobReptilianSprites
  sprites:
    Special: MobHumanoidAnyMarking # Wayfarer
    Hair: MobHumanoidAnyMarking # Wayfarer
    FacialHair: MobHumanoidAnyMarking # Wayfarer
    Head: MobReptilianHead
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    NeckFluff: MobHumanoidAnyMarking # Wayfarer
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Genital: MobHumanoidAnyMarking # Wayfarer
    Chest: MobReptilianTorso
    Eyes: MobHumanoidEyes
    LArm: MobReptilianLArm
    RArm: MobReptilianRArm
    LHand: MobReptilianLHand
    RHand: MobReptilianRHand
    LLeg: MobReptilianLLeg
    RLeg: MobReptilianRLeg
    LFoot: MobReptilianLFoot
    RFoot: MobReptilianRFoot
    Tail: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking # Wayfarer
    TailOversuit: MobHumanoidAnyMarking # Wayfarer
    RArmExtension: MobHumanoidAnyMarking # Wayfarer: Adds Wing Slot

- type: markingPoints
  id: MobReptilianMarkingLimits
  onlyWhitelisted: false # Wayfarer: true<false
  points:
    Special:
      points: 32 # Wayfarer
      required: false
    Hair:
      points: 32 # Wayfaer 0<32
      required: false
    FacialHair:
      points: 32 # Wayfaer 0<32
      required: false
    Head:
      points: 32 # Wayfarer
      required: false
    HeadTop:
      points: 32 # Wayfaer 2<32
      required: false
    HeadSide:
      points: 32 # Wayfaer 1<32
      required: false
    Snout:
      points: 32 # Wayfaer 1<32
      required: true
      defaultMarkings: [ LizardSnoutRound ]
    NeckFluff:
      points: 32 # Wayfarer
      required: false
    Chest:
      points: 32 # Wayfaer 3<32
      required: false
    Legs:
      points: 32 # Wayfaer 2<32
      required: false
    Arms:
      points: 32 # Wayfaer 2<32
      required: false
    Tail:
      points: 32 # Wayfaer 1<32
      required: true
      defaultMarkings: [ LizardTailSmooth ]
    UndergarmentTop:
      points: 32 # Wayfaer 1<32
      required: false
    UndergarmentBottom:
      points: 32 # Wayfaer 1<32
      required: false
    Genital:
      points: 32 # Wayfarer
      required: false
    Overlay:
      points: 32 # Wayfarer
      required: false

