# Base
- type: entity
  name: sealed chemical vial
  id: SealedChemVial
  parent: [BaseItem, RecyclableItemPlasticTiny]
  description: A container for holding various chemicals.
  components:
  - type: Item
    size: Tiny
    sprite: _WF/Objects/Specific/Chemistry/pills_canister.rsi
  - type: Sprite
    sprite: _WF/Objects/Specific/Chemistry/pills_canister.rsi
    state: vial

# Drugs
- type: entity
  name: cannabis brick
  parent: [BaseItem, RecyclableItemOrganicLarge]
  id: CannabisBrick
  description: "A brick of compressed cannabis."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: GroundCannabis
      amount: 8
    sound:
      path: /Audio/Effects/unwrap.ogg
  - type: Sprite
    sprite: Objects/Consumable/Food/snacks.rsi
    state: nutribrick
  - type: Item
    size: Small
  - type: StaticPrice
    price: 1000
  - type: PirateBountyItem
    id: CannabisBrick

- type: entity
  name: rainbow cannabis brick
  parent: [BaseItem, RecyclableItemOrganicLarge]
  id: RainbowCannabisBrick
  description: "A brick of compressed rainbow cannabis."
  components:
  - type: SpawnItemsOnUse
    items:
    - id: GroundCannabisRainbow
      amount: 8
    sound:
      path: /Audio/Effects/unwrap.ogg
  - type: Sprite
    sprite: Objects/Consumable/Food/snacks.rsi
    state: nutribrick
  - type: Item
    size: Small
  - type: StaticPrice
    price: 1500
  - type: PirateBountyItem
    id: RainbowCannabisBrick
