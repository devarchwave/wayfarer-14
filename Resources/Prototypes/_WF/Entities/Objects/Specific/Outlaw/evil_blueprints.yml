- type: entity
  parent: NFBaseBlueprintExpedition
  id: WFBaseBlueprintOutlaw
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: icon-base
      color: "#7f272b"
    - state: icon-text
    - sprite: Objects/Misc/bureaucracy.rsi
      state: paper_stamp-generic
      color: "#00ff00"
      offset: 0.15,-0.1
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
    - sprite: Objects/Misc/bureaucracy.rsi
      state: paper_words
      color: "#008040"
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-base
        color: "#7f272b"
      - state: inhand-left-text
      right:
      - state: inhand-right-base
        color: "#7f272b"
      - state: inhand-right-text
  - type: Tag
    tags:
    - WFBlueprintOutlaw
    - Document
    - Paper

- type: entity
  parent: WFBaseBlueprintOutlaw
  id: WFBlueprintC20r
  categories: [ HideSpawnMenu ]
  name: c-20r smg blueprint
  description: A blueprint with a schematic of a C-20r SMG.
  components:
  - type: Blueprint
    providedRecipes:
    - NFWeaponSubMachineGunC20r

- type: entity
  parent: WFBaseBlueprintOutlaw
  id: WFBlueprintAtreides
  categories: [ HideSpawnMenu ]
  name: atreides smg blueprint
  description: A blueprint with a schematic of a Atreides SMG.
  components:
  - type: Blueprint
    providedRecipes:
    - NFWeaponSubMachineGunAtreides
