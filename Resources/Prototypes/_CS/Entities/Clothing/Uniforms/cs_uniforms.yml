# Coyote Sector clothing.
# Descriptions have been made less lewd, and no longer reference lore outside of Wayfarer.

# == ABSTRACT PARENT
- type: entity
  parent: ClothingUniformSkirtBase
  id: CSClothes
  name: cool coyote jumpskirt
  description: A cute jumpskirt template for all Coyote Sector uniforms. # Wayfarer
  abstract: true
  components:
  - type: Sprite
    overrideDir: South
    enableOverrideDir: true
    sprite: _CS/Clothes/cs_uniforms.rsi
    layers:
    - state: acolyte_d
  - type: Clothing
    sprite: _CS/Clothes/cs_uniforms.rsi
    clothingVisuals:
      jumpsuit:
      - state: acolyte_d

