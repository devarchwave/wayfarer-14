- type: entity
  abstract: true
  parent: NFClothingBeltStorageBase
  id: CSClothingBeltStorageHolsterBase
  components:
  - type: ItemSlots
    slots:
      holster:
        name: clothing-belt-sidearm
        insertVerbText: clothing-belt-sidearm-insert-verb
        ejectVerbText: clothing-belt-sidearm-eject-verb
        whitelist:
          tags:
          - Sidearm
        insertOnInteract: true
        ejectSound:
          path: /Audio/_DEN/Weapons/pistol_unholster.ogg
        insertSound:
          path: /Audio/_DEN/Weapons/pistol_holster.ogg
  - type: Appearance
  - type: ItemMapper
    mapLayers:
      slp:
        whitelist:
          tags:
          - Sidearm
      flashbang:
        whitelist:
          components:
          - FlashOnTrigger
      stunbaton:
        whitelist:
          components:
          - Stunbaton
      tear_gas_grenade:
        whitelist:
          components:
          - SmokeOnTrigger
    sprite: Clothing/Belt/belt_overlay.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        showEnts: False
        occludes: True
        ents: []
      holster: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null

