- type: entity
  parent: [ NFBlueprintReceiverBase, BaseLatheLube ]
  id: EdisonTechFab
  name: edison engineering techfab
  description: Prints equipment for Edision engineers.
  components:
  - type: Sprite
    sprite: _CS/Structures/Machines/techfab.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: edison
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: EdisonTechFabCircuitboard
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - NFLightsStatic
    - NFBasicToolsStatic
    - NFBasicStorageStatic
    - NFBasicPartsStatic
    - NFBasicElectronicsStatic
    - NFBasicEvaStatic
    - NFBasicEVAToolsStatic
    - NFServiceToolsStatic
    - NFMaterialElectronicsStatic
    - NFEngineeringToolsStatic
    - NFEngineeringBoardsStatic
    - NFEngineeringStructureBoardsStatic
    - NFEngineeringMaterialsStatic
    - NFInflatablesStatic
    - NFEngineeringArchetypeStatic
    - CSPlumbingStatic # CS - showers, sinks, drains
    - CSEdisonEngineeringMachineBoardsStatic
    - CSEdisionEngineeringThrusterPack
    - CSEdisionEngineeringMachineMiscPack
    # Far Horizons
    - ReactorPartsBasic
  - type: BlueprintReceiver
    whitelist:
      tags:
      - NFBlueprintEngineeringTechfab
  - type: OreSiloClient
