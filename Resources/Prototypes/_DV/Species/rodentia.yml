    TailOversuit: MobHumanoidAnyMarking # Wayfarer
    RArmExtension: MobHumanoidAnyMarking # Wayfarer

- type: markingPoints
  id: MobRodentiaMarkingLimits
  points:
    Special:
      points: 32 # Wayfarer: 0<32
      required: false
    Hair:
      points: 32 # Wayfarer: 1<32
      required: false
    FacialHair:
      points: 32 # Wayfarer: 1<32
      required: false
    Head:
      points: 32 # Wayfarer: 1<32
      required: false
    HeadTop:
      points: 32 # Wayfarer: 1<32
      required: true
      defaultMarkings: [ RodentiaHeadTopEarDefault ]
    HeadSide:
      points: 32 # Wayfarer: 1<32
      required: false
    Snout:
      points: 32 # Wayfarer: 1<32
      required: false
    NeckFluff:
      points: 32 # Wayfarer
      required: false
    Chest:
      points: 32 # Wayfarer: 2<32
      required: false
    Legs:
      points: 32 # Wayfarer: 4<32
      required: false
    Arms:
      points: 32 # Wayfarer: 4<32
      required: false
    Tail:
      points: 32 # Wayfarer: 1<32
      required: true
      defaultMarkings: [ RodentiaTailDefault ]
    UndergarmentTop:
      points: 32 # Wayfarer
      required: false
    UndergarmentBottom:
      points: 32 # Wayfarer
      required: false
    Genital:
      points: 32 # Wayfarer
      required: false
    Overlay:
      points: 32 # Wayfarer
      required: false

