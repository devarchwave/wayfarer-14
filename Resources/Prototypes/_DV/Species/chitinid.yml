      required: false
    FacialHair:
      points: 32 # Wayfarer: 0<32
      required: false
    Head:
      points: 32 # Wayfarer: 1<32
      required: false
    HeadTop:
      points: 32 # Wayfarer: 1<32
      required: false # Wayfarer: true<false
      defaultMarkings: [ ChitinidAntennasDefault ]
    HeadSide:
      points: 32 # Wayfarer: 1<32
      required: false
    Snout:
      points: 32 # Wayfarer: 1<32
      required: false
    NeckFluff:
      points: 32 # Wayfarer
      required: false
    Chest:
      points: 32 # Wayfarer: 1<32
      required: false
    Legs:
      points: 32 # Wayfarer: 6<32
      required: false
    Arms:
      points: 32 # Wayfarer: 6<32
      required: false
    Tail:
      points: 32 # Wayfarer: 1<32
      required: false # Wayfarer: true<false
      defaultMarkings: [ ChitinidWingsDefault ]
    UndergarmentTop:
      points: 32 # Wayfarer: 3<32
      required: false
    UndergarmentBottom:
      points: 32 # Wayfarer: 3<32
      required: false
    Genital:
      points: 32 # Wayfarer
      required: false
    Overlay:
      points: 32 # Wayfarer
      required: false

