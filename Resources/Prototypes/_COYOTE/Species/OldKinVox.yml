- type: species
  id: OldKinVox
  name: species-name-oldkinvox
  roundStart: true
  prototype: MobOldKinVox
  sprites: MobOldKinVoxSprites
  markingLimits: MobHumanMarkingLimits #MobOldKinVoxMarkingLimits WF
  dollPrototype: MobOldKinVoxDummy
  skinColoration: Hues # imp VoxFeathers<Hues
  defaultSkinTone: "#526d29"
  maleFirstNames: NamesVox
  femaleFirstNames: NamesVox
  naming: First
  sexes:
  - Unsexed # NO WAY MY VOX SEXES ALL THE TIME
  kind:
  - VoxLike

  minAge: 500     # OLD-kin, for a reason.
  maxAge: 1000000 # Their age is based off their cortical stack, not the body they inhabit
  youngAge: 4000  # They saw jebus rise and fall, and wonder why humans think they are superior
  oldAge: 400000

  minHeight: 0.9
  defaultHeight: 1.2
  maxHeight: 1.3
  minWidth: 0.85
  defaultWidth: 1.2
  maxWidth: 1.35

