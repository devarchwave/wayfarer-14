- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobOldKinVox
  abstract: true
  components:

  - type: Icon
    sprite: _COYOTE/Mobs/Species/OldKinVox/parts.rsi
    state: full

  - type: Body
    prototype: OldKinVox
    requiredLegs: 2
    #- type: VoxAccent # Not yet coded

  - type: Speech
    speechVerb: Vox
    speechSounds: Vox
    allowedEmotes: ['Click', 'Chitter', 'Hiss', 'Coo'] # Impstation

  - type: TypingIndicator
    proto: vox

  - type: Vocal
    sounds:
      Male: UnisexVox
      Female: UnisexVox
      Unsexed: UnisexVox

  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 5

  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Vox

  - type: PassiveDamage
    # Augment normal health regen to be able to tank some Poison damage
    # This allows Vox to take their mask off temporarily to eat something without needing a trip to medbay afterwards.
    allowedStates:
    - Alive
    damageCap: 20
    damage:
      types:
        Heat: -0.07
        Poison: -0.2 # needs to be less than the PendingZombieComponent does or they never become zombies by the disease.
      groups:
        Brute: -0.07

  - type: PressureProtection # Soup Can
    highPressureMultiplier: 1
    lowPressureMultiplier: 1000
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.1 #Evolved into a crab, SMH
        Heat: 0.5

  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 250
    sweatHeatRegulation: 1000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 146.575
    thermalRegulationTemperatureThreshold: 2 # bottoms out at 34.5kelvin in space

  - type: Temperature
    coldDamageThreshold: 1.0 # required for math things
    heatDamageThreshold: 308 # Very close to station temperature, don't put near a fire. Or do, I'm not your mother
    coldDamage:
      types:
        Cold : 0 #Just incase
    heatDamage:
      types:
        Heat : 3 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      85.53: 0.8
      45.87: 0.6
      1.0: 0.4 #Theoretically impossible, unless you start freeze raying them in space.

  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi

  - type: Bloodstream
    bloodReagent: AmmoniaBlood

  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 2
        Bloodloss: 4 #Ribbed, for your pleasure

  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.42
        density: 220
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer

  - type: ProtectedFromStepTriggers

  - type: MobThresholds #Durable, but dies sooner
    thresholds:
      0: Alive
      125: Critical
      175: Dead

  - type: Stamina
    critThreshold: 85

  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.75
      80: 0.55
      100: 0.35

  - type: Sprite # Need to redefine the whole order to draw the tail over their gas tank
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: [ "jumpsuit" ]
    - map: [ "enum.HumanoidVisualLayers.LFoot" ]
    - map: [ "enum.HumanoidVisualLayers.RFoot" ]
    - map: [ "enum.HumanoidVisualLayers.LHand" ]
    - map: [ "enum.HumanoidVisualLayers.RHand" ]
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "eyes" ]
    - map: [ "id" ]
    - map: [ "outerClothing" ]
    - map: [ "belt" ]
    - map: [ "back" ]
    - map: [ "neck" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
    - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
    - map: [ "suitstorage" ] # This is not in the default order
    - map: [ "enum.HumanoidVisualLayers.Tail" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
    - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false
    - map: [ "clownedon" ]
      sprite: "Effects/creampie.rsi"
      state: "creampie_vox" # Not default
      visible: false
  - type: HumanoidAppearance
    species: Vox
    undergarmentTop: UndergarmentTopTanktopVox
    undergarmentBottom: UndergarmentBottomBoxersVox
    markingsDisplacement:
      Hair:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: hair
  - type: Inventory
    speciesId: vox
    #templateId: OldKinVox
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: hand
      head:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: head
      back:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: ears
      shoes:
        sizeMaps:
          32:
            sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
            state: shoes
  - type: Hands
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
          state: hand_l
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: _COYOTE/Mobs/Species/OldKinVox/displacement.rsi
          state: hand_r

