#region Disabler bolts
- type: entity
  parent: BulletDisabler
  id: NFBulletDisablerStaminaOnly
  name: disabler bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Shock: 0
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  id: NFBulletDisabler
  name: disabler bolt
  parent: BulletDisabler
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Shock: 2
    soundHit:
      collection: WeakHit
    forceSound: true
