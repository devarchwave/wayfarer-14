# WizDen
#region .35 pistol
- type: entity
  id: NFBulletPistol35
  name: bullet (.35 pistol)
  parent: NFBaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 6 # Wayfarer 5<6
        Blunt: 6 # Wayfarer 5<6
  - type: StaminaDamageOnCollide
    damage: 4 # 15 hits to slowdown # Wayfarer 5<4

- type: entity
  id: NFBulletPistol35Overpressure
  name: bullet (.35 pistol, overpressure)
  parent: NFBaseBulletOverpressure
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 6.5 # Wayfarer 5<6.5
        Blunt: 7.5 # Wayfarer 6<7.5
  - type: StaminaDamageOnCollide
    damage: 5 # 12 hits to slowdown # Wayfarer 6<5

- type: entity
  id: NFBulletPistol35Incendiary
  name: bullet (.35 pistol, incendiary)
  parent: NFBaseBulletIncendiary
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 7.2 # 0.6 * base total dmg # Wayfarer 6<7.2
        Heat: 5 # 0.4 * base total dmg # Wayfarer 4<5
  - type: StaminaDamageOnCollide
    damage: 4 # 15 hits to slowdown # Wayfarer 5<4

- type: entity
  id: NFBulletPistol35Uranium
  parent: NFBaseBulletUranium
  name: bullet (.35 pistol, uranium)
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 9.9 # 0.6 * (1.4 * base total dmg) # Wayfarer 8.4<9.9
        Radiation: 6.6 # 0.4 * (1.4 * base total dmg) # Wayfarer 5.6<6.6
  - type: StaminaDamageOnCollide
    damage: 4 # 15 hits to slowdown # Wayfarer: 6<4

- type: entity
  id: NFBulletPistol35Practice
  name: bullet (.35 pistol, practice)
  parent: NFBaseBulletPractice
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 0.5

