    Head:
      points: 32 # Wayfarer: 1<32
      required: false
    HeadTop:
      points: 32 # Wayfarer: 1<32
      required: true
      defaultMarkings: [ GoblinEarsBasic ]
    HeadSide:
      points: 32 # Wayfarer
      required: false
    Snout:
      points: 32 # Wayfarer: 2<32
      required: false
#      defaultMarkings: [ GoblinNoseBasic ]
    NeckFluff:
